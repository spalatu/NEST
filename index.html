<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nest — Design Asset Manager</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/modals.css">
</head>

<body>

    <header id="topbar">
        <button class="tb-nav-btn" id="backBtn" title="Back" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
        <button class="tb-nav-btn" id="fwdBtn" title="Forward" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
        <div class="tb-sep"></div>
        <div class="tb-zoom-wrap">
            <span class="tb-zoom-label" id="zoomLabel">100%</span>
            <input type="range" class="tb-zoom-slider" id="zoomSlider" min="40" max="200" value="100">
        </div>
        <div class="tb-spacer"></div>
        <div class="tb-search-wrap">
            <span class="tb-search-icon">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.5" />
                    <path d="M9 9L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </span>
            <input type="text" id="searchInput" placeholder="Search images…">
        </div>
        <div class="tb-sep"></div>
        <button class="tb-btn tb-btn-secondary" id="apiBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor" />
                <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor" />
                <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor" />
                <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor" />
            </svg>
            Browse Unsplash
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn tb-btn-primary" id="importBtn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 1v8M3 6l3.5 3.5L10 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M1 11h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            Import
        </button>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    </header>

    <main id="app">

        <aside id="leftSidebar">
            <div class="sidebar-inner">
                <div class="sidebar-section-header">
                    <span class="sidebar-section-title">Library</span>
                </div>
                <div id="smartFolders"></div>
                <div class="sidebar-section-header" style="margin-top:20px">
                    <span class="sidebar-section-title">Folders</span>
                    <button class="sidebar-add-btn" id="addFolderBtn" title="New folder">
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div id="userFolders"></div>
                <div id="newFolderInputWrap" style="display:none">
                    <input type="text" class="folder-inline-input" id="newFolderInput" placeholder="Folder name…">
                </div>
            </div>
            <div class="sidebar-footer" id="sidebarFooter" style="display:none">
                <button id="emptyTrashBtn">Empty Trash</button>
            </div>
        </aside>

        <section id="gallery">
            <div id="galleryInner"></div>
            <div id="dropOverlay"></div>
            <div id="galleryEmpty">
                <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                    <rect x="6" y="10" width="44" height="36" rx="6" stroke="currentColor" stroke-width="2" />
                    <path d="M6 22h44" stroke="currentColor" stroke-width="1.5" />
                    <circle cx="18" cy="34" r="5" stroke="currentColor" stroke-width="1.5" />
                    <path d="M30 30l8 8M30 38l8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <p>Drop images here or click Import<br>to start building your library</p>
            </div>
        </section>

        <aside id="rightSidebar">
            <div id="rsEmpty">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect x="4" y="6" width="28" height="24" rx="4" stroke="currentColor" stroke-width="1.5" />
                    <circle cx="13" cy="16" r="3" stroke="currentColor" stroke-width="1.5" />
                    <path d="M4 24l7-5 5 4 5-4 7 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <p>Select an image</p>
            </div>
            <div id="rsDetail" style="display:none;">
                <div id="rsPreview"><img id="rsPreviewImg" src="" alt="Preview"></div>
                <div class="rs-sections" id="rsSections"></div>
            </div>
        </aside>

    </main>

    <div id="contextMenu">
        <div class="ctx-item" id="ctxTrash">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M2 3.5h9M5 3.5V2.5a1 1 0 012 0v1M4.5 3.5l.5 7h3l.5-7" stroke="currentColor" stroke-width="1.4"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Move to Trash
        </div>
        <div class="ctx-sep"></div>
        <div class="ctx-item" id="ctxExportPng">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 1v8M3 6l3.5 3.5L10 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M1 11h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
            Export as PNG
        </div>
        <div class="ctx-item" id="ctxExportJpg">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 1v8M3 6l3.5 3.5L10 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M1 11h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
            Export as JPG
        </div>
    </div>

    <div class="color-tooltip hidden" id="colorTooltip"></div>

    <div class="modal-backdrop" id="importModal">
        <div class="modal-card">
            <div class="modal-title" id="importModalTitle">Add to Nest</div>
            <input type="text" class="modal-input" id="importTitleInput" placeholder="Image title (required)">
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" id="importCancelBtn">Cancel</button>
                <button class="modal-btn modal-btn-primary" id="importConfirmBtn" disabled>Add to Nest</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="confirmDialog">
        <div class="modal-card">
            <div class="modal-title" id="confirmTitle">Are you sure?</div>
            <p id="confirmMsg" style="font-size:13.5px;color:var(--text2);margin-bottom:20px;line-height:1.5"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" id="confirmCancelBtn">Cancel</button>
                <button class="modal-btn modal-btn-danger" id="confirmOkBtn">Action</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="apiModal">
        <div class="modal-card">
            <div class="pexels-header">
                <div class="pexels-title">Browse Unsplash</div>
                <div class="pexels-search-row">
                    <input type="text" class="pexels-search-input" id="apiSearchInput" placeholder="Search imagery…">
                    <button class="pexels-search-btn" id="apiSearchBtn">Search</button>
                    <button class="pexels-close-btn" id="apiCloseBtn">✕ Close</button>
                </div>
            </div>
            <div class="pexels-body" id="apiBody">
                <div class="pexels-status" id="apiStatus">Searching…</div>
                <div class="pexels-grid" id="apiGrid"></div>
            </div>
            <div class="pexels-footer">
                <button class="pexels-load-more" id="apiLoadMore" style="display:none;">Load more</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/import.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
